crog_actions:
  - name: LAN connection
    command: nc -z -w 2 {{ haproxy_config.backend }} 443
    tries: 3
    code: 0
    cron: "* * * * *"
    when:
      start: "{{ hc_lan }}/start"
      success: "{{ hc_lan }}"
      failure: "{{ hc_lan }}/fail"
  - name: VPN Interface Status
    command: wg show wg0
    tries: 3
    code: 0
    cron: "* * * * *"
    when:
      start: "{{ hc_conn }}/start"
      success: "{{ hc_conn }}"
      failure: "{{ hc_conn }}/fail"

crog_verbose: true

crog_server_ip: "{{ haproxy_config.ip }}"

alloy_server_enabled: false
alloy_loki_server_url: http://loki.monitoring.svc.cluster.local:3100

haproxy_stats_bind: "{{ haproxy_config.ip }}"
haproxy_stats_extras:
  - bind localhost:8404

haproxy_listeners:
  - name: http
    bind: "*:80"
    mode: tcp
    balance: leastconn
    extras:
      - option tcpka
    servers:
      - name: k3s-nginx
        host: "{{ haproxy_config.backend }}:80"
        options: "check port 80 {{ 'send-proxy-v2' if haproxy_config.proxy }}"

haproxy_frontends:
  - name: https
    bind: "*:443"
    mode: tcp
    balance: leastconn
    extras:
      - option tcpka
      - tcp-request inspect-delay 5s
      - tcp-request content accept if { req.ssl_hello_type 1 }
    backend: k3s-traefik
    backendIf:
      - backend: k3s-envoy
        host: docs.plexmox.com

haproxy_backends:
  - name: k3s-traefik
    mode: tcp
    host: "{{ haproxy_config.backend }}:443"
    options: "check port 443 {{ 'send-proxy-v2' if haproxy_config.proxy }}"
  - name: k3s-envoy
    mode: tcp
    host: "public.gateways.svc.cluster.local:443"
    options: "check port 443"

wireguard_ip_forwarding: true
