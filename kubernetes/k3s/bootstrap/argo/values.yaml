global:
  domain: argocd.plexmox.com

argo-cd:
  dex:
    enabled: false

  controller:
    args:
      appResyncPeriod: 60
    metrics:
      enabled: true
      service:
        annotations:
          prometheus.io/scrape: true
          prometheus.io/path: /metrics
          prometheus.io/port: 8082

  server:
    config:
      url: https://argocd.plexmox.com
      repositories: |
        - type: helm
          name: stable
          url: https://charts.helm.sh/stable
        - type: helm
          name: argo-cd
          url: https://argoproj.github.io/argo-helm
      resource.exclusions: |
        - apiGroups:
            - cilium.io
          kinds:
            - CiliumIdentity
          clusters:
            - '*'

    metrics:
      enabled: true
      service:
        annotations:
          prometheus.io/scrape: true
          prometheus.io/path: /metrics
          prometheus.io/port: 8083

  repoServer:
    metrics:
      enabled: true
      service:
        annotations:
          prometheus.io/scrape: true
          prometheus.io/path: /metrics
          prometheus.io/port: 8084

  applicationSet:
    metrics:
      enabled: true
      service:
        annotations:
          prometheus.io/scrape: true
          prometheus.io/path: /metrics
          prometheus.io/port: 8080

  configs:
    cm:
      kustomize.buildOptions: --enable-helm
      accounts.readonly: apiKey
      oidc.config: |
        name: Pocket
        issuer: https://pocket.plexmox.com
        enablePKCEAuthentication: true
        requestedScopes: ["openid", "profile", "email", "groups"]
        clientID: $pocket-oidc-credentials:client_id
        clientSecret: $pocket-oidc-credentials:client_secret
    params:
      server.insecure: true
    rbac:
      policy.csv: |
        g, admin, role:admin
        g, readonly, role:readonly
