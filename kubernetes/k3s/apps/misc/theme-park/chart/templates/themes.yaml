{{- range .Values.themes }}
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.envoyproxy.io/envoyextensionpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: "{{ .route }}"
  namespace: "{{ .namespace }}"
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: "{{ .route }}"
  lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          local accept_header = request_handle:headers():get("accept") or ""
          if string.find(string.lower(accept_header), "text/html") then
            request_handle:headers():remove("accept-encoding")
          end
          {{- if .realIP }}
          local real_ip = request_handle:streamInfo():downstreamRemoteAddress()
          request_handle:logInfo("handling the ip " .. (real_ip or "nil"))
          if real_ip then
            request_handle:headers():remove("x-forwarded-for")
            request_handle:headers():add("x-forwarded-for", real_ip)
            request_handle:headers():remove("x-real-ip")
            request_handle:headers():add("x-real-ip", real_ip)
          end
          {{- end }}
        end

        function envoy_on_response(response_handle)
          local contentType = response_handle:headers():get("content-type") or ""

          if string.find(string.lower(contentType), "text/html") and not response_handle:headers():get("content-encoding") then
            local body_obj = response_handle:body()
            if body_obj and body_obj:length() > 0 then
              local css_url = "https://theme-park.plexmox.com/css/base/{{ .app }}/{{ .theme }}.css"

              {{- if .head }}
              local search = "</[Hh][Ee][Aa][Dd]>"
              local replace = "</head>"
              {{- else }}
              local search = "</[Bb][Oo][Dd][Yy]>"
              local replace = "</body>"
              {{- end }}

              local inject_str = '<link rel="stylesheet" type="text/css" href="' .. css_url .. '">' .. replace
              body_obj:setBytes(string.gsub(body_obj:getBytes(0, body_obj:length()), search, inject_str))
              response_handle:headers():replace("content-length", tostring(body_obj:length()))
            end
          end
        end
{{- end }}
