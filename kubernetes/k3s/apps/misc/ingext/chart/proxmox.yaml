apiVersion: v1
kind: Service
metadata:
  name: proxmox
spec:
  ports:
    - protocol: TCP
      port: 8006
      targetPort: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox
subsets:
  - addresses:
      - ip: 10.0.0.150
      - ip: 10.0.0.152
      - ip: 10.0.0.154
    ports:
      - port: 8006
---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: proxmox
spec:
  hostnames:
    - proxmox.plexmox.com
  rules:
    - backendRefs:
        - kind: Service
          name: proxmox
          port: 8006
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal
      namespace: gateways
