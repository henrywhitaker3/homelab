# yaml-language-server: $schema=https://raw.githubusercontent.com/authelia/chartrepo/refs/heads/master/charts/authelia/values.schema.json

pod:
  extraVolumeMounts:
    - mountPath: /custom
      name: custom
      readOnly: true

  extraVolumes:
    - name: custom
      secret:
        items:
          - key: configuration.oidc.yaml
            path: configuration.oidc.yaml
        secretName: authelia-secrets

service:
  clusterIP: null

rbac:
  enabled: true

ingress:
  enabled: true

  gatewayAPI:
    enabled: true
    parentRefs:
      - kind: Gateway
        name: public
        namespace: gateways

secret:
  existingSecret: "authelia-secrets"

configMap:
  authentication_backend:
    ldap:
      enabled: true
      implementation: lldap
      address: "ldap://lldap.identity.svc.cluster.local:3890"
      base_dn: "DC=plexmox,DC=com"
      user: "UID=authelia,OU=people,DC=plexmox,DC=com"
    file:
      enabled: false

  telemetry:
    metrics:
      enabled: true

      serviceMonitor:
        enabled: true

  access_control:
    default_policy: deny
    rules:
      - domain: argocd.plexmox.com
        resources:
          - "^/api/webhook"
        policy: bypass
      - domain:
          - plexmox.com
          - "*.plexmox.com"
        policy: two_factor
      - domain:
          - henrywhitaker.com
          - "*.henrywhitaker.com"
        policy: two_factor

  session:
    cookies:
      - domain: plexmox.com
        subdomain: auth
        authelia_url: https://auth.plexmox.com
        default_redirection_url: https://plexmox.com

    redis:
      enabled: true
      host: dragonfly.dragonfly.svc
      database_index: 3

  storage:
    postgres:
      enabled: false

    mysql:
      enabled: true
      address: tcp://mariadb.mariadb.svc:3306
      username: authelia
      database: authelia

  notifier:
    filesystem:
      enabled: true

    smtp:
      enabled: false

  server:
    buffers:
      read: 8192
      write: 8192
