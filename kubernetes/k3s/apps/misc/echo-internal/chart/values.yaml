---
# yaml-language-server: $schema=https://henrywhitaker3.github.io/generic-helm-chart/subchart.schema.json
generic:
  replicaCount: 1

  image:
    repository: ghcr.io/mendhak/http-https-echo
    pullPolicy: IfNotPresent
    tag: "40"

  service:
    port: 8080

  httpRoute:
    enabled: true
    hostnames: [echo-internal.plexmox.com]
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: internal
        namespace: gateways
    rules:
      - port: 8080
        matches:
          - path:
              type: PathPrefix
              value: /

  resources:
    requests:
      cpu: 5m
      memory: 10Mi
    limits:
      memory: 50Mi
