pod-gateway:
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/angelnu/pod-gateway
    tag: v1.13.0

  webhook:
    image:
      pullPolicy: IfNotPresent
      repository: ghcr.io/angelnu/gateway-admision-controller
      tag: v3.12.0

  controllers:
    main:
      containers:
        gluetun:
          enabled: true
          env:
            - name: VPN_SERVICE_PROVIDER
              value: mullvad
            - name: VPN_TYPE
              value: wireguard
            - name: VPN_INTERFACE
              value: wg0
            - name: FIREWALL
              value: "off"
            - name: DOT
              value: "off"
            - name: SERVER_COUNTRIES
              value: UK
            - name: HEALTH_VPN_DURATION_INITIAL
              value: 30s
            - name: HEALTH_TARGET_ADDRESS
              value: "1.1.1.1"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: vpn-gateway-secrets
                  key: private_key
            - name: WIREGUARD_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: vpn-gateway-secrets
                  key: addresses

  settings:
    NOT_ROUTED_TO_GATEWAY_CIDRS: "10.43.0.0/16 10.0.0.0/24"
    VPN_LOCAL_CIDRS: 10.0.0.0/8

  DNSPolicy: ClusterFirst

  routed_namespaces:
    - tunneled
