pod-gateway:
  controllers:
    main:
      containers:
        gluetun:
          enabled: true
          env:
            - name: VPN_SERVICE_PROVIDER
              value: mullvad
            - name: VPN_TYPE
              value: wireguard
            - name: VPN_INTERFACE
              value: wg0
            - name: FIREWALL
              value: "off"
            - name: DOT
              value: "off"
            - name: SERVER_COUNTRIES
              value: UK
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: vpn-gateway-secrets
                  key: private_key
            - name: WIREGUARD_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: vpn-gateway-secrets
                  key: addresses

  settings:
    NOT_ROUTED_TO_GATEWAY_CIDRS: "10.43.0.0/16 10.0.0.0/24"
    VPN_LOCAL_CIDRS: 10.0.0.0/8
    VPN_TRAFFIC_PORT: 51820

  DNSPolicy: ClusterFirst

  routed_namespaces:
    - tunneled

  networkpolicies:
    main:
      enabled: false
      controller: main
      policyTypes:
        - Egress
      rules:
        egress:
          # Allow only VPN traffic to Internet
          - to:
              - ipBlock:
                  cidr: 0.0.0.0/0
            ports:
              - port: 51820
                protocol: UDP
          # Allow any traffic within k8s
          - to:
              - ipBlock:
                  cidr: 10.0.0.0/8
