generic:
  nameOverride: organizr
  fullnameOverride: organizr

  replicaCount: 1

  image:
    repository: organizr/organizr
    pullPolicy: Always
    tag: latest

  extraContainers:
    - name: authz
      image: ghcr.io/henrywhitaker3/organizr-envoy-auth-proxy:v1.0.6
      ports:
        - name: authz
          containerPort: 12345
          protocol: TCP
      resources:
        requests:
          cpu: 10m
          memory: 40Mi
      env:
        # - name: LOG_LEVEL
        #   value: debug
        - name: ORGANIZR_HOST
          value: plexmox.com
        - name: ORGANIZR_SCHEME
          value: https
        - name: ORGANIZR_GROUP
          value: "1"

  service:
    port: 80
    additionalPorts:
      - name: authz
        port: 12345
        targetPort: authz
        protocol: TCP

  resources:
    requests:
      cpu: 100m
      memory: 128Mi

  httpRoute:
    enabled: true
    labels:
      traefik-instance: public
    hostnames: [plexmox.com]
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: public
        namespace: traefik
    rules:
      - port: 80
        matches:
          - path:
              type: PathPrefix
              value: /

  pvc:
    enabled: true
    mountPath: /config
    storageClassName: longhorn
    size: 2Gi

  deploymentStrategy:
    type: Recreate

  probes:
    initialDelaySeconds: 15
    timeoutSeconds: 3

  config:
    fpm: "true"
    branch: "dev"
    PUID: "1000"
    PGID: "1000"
    TZ: Europe/London
