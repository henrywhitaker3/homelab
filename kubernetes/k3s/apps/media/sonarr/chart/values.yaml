generic:
  nameOverride: sonarr
  fullnameOverride: sonarr

  replicaCount: 1

  image:
    repository: ghcr.io/home-operations/sonarr
    pullPolicy: IfNotPresent
    tag: "4.0.16.2946"

  service:
    port: 8989

  resources:
    requests:
      cpu: 50m
      memory: 200Mi

  httpRoute:
    enabled: true
    hostnames: [plexmox.com]
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: public
        namespace: gateways
    rules:
      - port: 8989
        matches:
          - path:
              type: PathPrefix
              value: /sonarr

  pvc:
    enabled: true
    mountPath: /config
    storageClassName: longhorn
    size: 2Gi

  deploymentStrategy:
    type: Recreate

  probes:
    initialDelaySeconds: 15
    type: tcpSocket
    options:
      port: http

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

  config:
    SONARR__AUTH__METHOD: External
    SONARR__AUTH__REQUIRED: DisabledForLocalAddresses
    SONARR__POSTGRES__MAINDB: sonarr-main
    SONARR__POSTGRES__LOGDB: sonarr-log
    SONARR__SERVER__URLBASE: sonarr
    TZ: Europe/London

  env:
    - name: SONARR__POSTGRES__HOST
      valueFrom:
        secretKeyRef:
          name: crunchy-pguser-sonarr
          key: host
    - name: SONARR__POSTGRES__USER
      valueFrom:
        secretKeyRef:
          name: crunchy-pguser-sonarr
          key: user
    - name: SONARR__POSTGRES__PASSWORD
      valueFrom:
        secretKeyRef:
          name: crunchy-pguser-sonarr
          key: password

  volumes:
    - name: media
      hostPath:
        path: /plex

  volumeMounts:
    - mountPath: /data
      name: media
