---
# yaml-language-server: $schema=https://henrywhitaker3.github.io/generic-helm-chart/subchart.schema.json
generic:
  replicaCount: 1

  image:
    repository: ghcr.io/jsclayton/prometheus-plex-exporter
    pullPolicy: Always
    tag: latest

  service:
    port: 9000

  ingress:
    enabled: false

  probes:
    type: tcpSocket
    options:
      port: http
    initialDelaySeconds: 60

  metrics:
    enabled: true

  config:
    PLEX_SERVER: https://plex.plexmox.com

  secrets:
    enabled: true
    key: plex-exporter
