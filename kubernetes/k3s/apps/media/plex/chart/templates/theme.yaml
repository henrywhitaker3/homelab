---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/traefik.io/middleware_v1alpha1.json
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: plex
  labels:
    traefik-instance: public
spec:
  plugin:
    themepark:
      app: plex
      theme: nord
      baseUrl: https://theme-park.plexmox.com
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/gateway.envoyproxy.io/envoyextensionpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: plex
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: plex
  lua:
    - type: Inline
      inline: |
        local url = "https://theme-park.plexmox.com/css/base/plex/nord.css"
        function envoy_on_response(response_handle)
          local headers = response_handle:headers()
          local content_type = headers:get("content-type")

          if content_type and string.find(content_type, "text/html") then
            local body = response_handle:body(true)
            local body_str = body:getBytes(0, body:length())

            local css_tag = '<link rel="stylesheet" href="'.. url .. '">'
            local new_body = string.gsub(body_str, "</head>", css_tag .. "</head>", 1)

            body:setBytes(new_body)
            headers:replace("content-length", tostring(#new_body))
          end
        end
