---
# yaml-language-server: $schema=https://raw.githubusercontent.com/henrywhitaker3/crds/refs/heads/main/schemas/gateway.envoyproxy.io/backend_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: plex
spec:
  endpoints:
    - fqdn:
        hostname: plex.media.svc.cluster.local
        port: 32400
  tls:
    insecureSkipVerify: true
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/henrywhitaker3/crds/refs/heads/main/schemas/gateway.networking.k8s.io/experimental/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plex
spec:
  hostnames:
    - plex.plexmox.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: gateways
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal
      namespace: gateways
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: plex
      matches:
        - path:
            type: PathPrefix
            value: /library/streams
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - Range
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: plex
      matches:
        - path:
            type: PathPrefix
            value: /
