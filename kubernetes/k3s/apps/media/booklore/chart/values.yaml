---
# yaml-language-server: $schema=https://henrywhitaker3.github.io/generic-helm-chart/subchart.schema.json
generic:
  replicaCount: 1

  image:
    repository: ghcr.io/booklore-app/booklore
    pullPolicy: IfNotPresent
    tag: "v2.2.1"

  service:
    port: 9568

  resources:
    requests:
      cpu: 100m
      memory: 750Mi

  config:
    BOOKLORE_PORT: "9568"
    TZ: Europe/London
    # PUID: "1000"
    # PGID: "1000"
    DATABASE_URL: jdbc:mariadb://mariadb.mariadb.svc.cluster.local:3306/booklore
    DATABASE_USERNAME: booklore

  env:
    - name: DATABASE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: booklore-creds
          key: db-password

  # podSecurityContext:
  #   runAsNonRoot: true
  #   runAsUser: 1000
  #   runAsGroup: 1000
  #   fsGroup: 1000
  #   fsGroupChangePolicy: OnRootMismatch

  httpRoute:
    enabled: true
    hostnames: [books.plexmox.com]
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: public
        namespace: gateways
    rules:
      - port: 9568
        matches:
          - path:
              type: PathPrefix
              value: /

  pvc:
    enabled: true
    mountPath: /app/data
    storageClassName: longhorn
    size: 1Gi

  volumes:
    - name: books
      hostPath:
        path: /plex/Media/Booklore/books
    - name: bookdrop
      hostPath:
        path: /plex/Media/Booklore/bookdrop

  volumeMounts:
    - mountPath: /books
      name: books
    - mountPath: /bookdrop
      name: bookdrop

  deploymentStrategy:
    type: Recreate

  probes:
    initialDelaySeconds: 15
    timeoutSeconds: 5

  netpol:
    enabled: true
    allowCoredns: true
    ingress:
      - from:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: gateways
            podSelector:
              matchLabels:
                gateway.networking.k8s.io/gateway-name: public
        ports:
          - port: 9568
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: mariadb
            podSelector:
              matchLabels:
                app.kubernetes.io/name: mariadb
        ports:
          - port: 3306
      - to:
          - ipBlock:
              cidr: 0.0.0.0/0
              except:
                - 10.0.0.0/24
