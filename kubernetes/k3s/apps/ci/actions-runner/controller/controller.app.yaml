---
# yaml-language-server: $schema=https://raw.githubusercontent.com/henrywhitaker3/crds/refs/heads/main/schemas/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actions-runner-controller
  namespace: argo
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: actions-system
    server: https://kubernetes.default.svc
  project: ci
  sources:
    - repoURL: https://gitlab.com/henrywhitaker3/homelab.git
      targetRevision: HEAD
      path: kubernetes/k3s/apps/ci/actions-runner/controller/chart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
