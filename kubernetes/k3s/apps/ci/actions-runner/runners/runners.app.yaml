---
# yaml-language-server: $schema=https://raw.githubusercontent.com/henrywhitaker3/crds/refs/heads/main/schemas/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actions-runners
  namespace: argo
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: actions-runners
    server: https://kubernetes.default.svc
  project: apps
  sources:
    - repoURL: https://gitlab.com/henrywhitaker3/homelab.git
      targetRevision: main
      path: kubernetes/k3s/apps/ci/actions-runner/runners/shared
    - repoURL: https://gitlab.com/henrywhitaker3/homelab.git
      targetRevision: main
      path: kubernetes/k3s/apps/ci/actions-runner/runners/homelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
