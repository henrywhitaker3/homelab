prompage:
  configuration:
    ui:
      theme: auto

    datasources:
      - name: prometheus
        type: prometheus
        url: http://vmsingle-metrics.monitoring.svc:8429

    refresh: 1m

    services:
      - name: Homepage
        group: Services
        query:
          query: monitor_status{monitor_name="Organizr (external)"}
          expression: int(result) == 1
          bool: true
        extras:
          - name: Latency
            units: ms
            query: sum(avg_over_time(monitor_response_time{monitor_name="Organizr (external)"}[5m]))
      - name: Plex
        group: Services
        query:
          query: monitor_status{monitor_name="Plex"}
          expression: int(result) == 1
          bool: true
        extras:
          - name: Latency
            units: ms
            query: sum(avg_over_time(monitor_response_time{monitor_name="Plex"}[5m]))
      - name: Requests
        group: Services
        query:
          query: monitor_status{monitor_name="Seerr"}
          expression: int(result) == 1
          bool: true
        extras:
          - name: Latency
            units: ms
            query: sum(avg_over_time(monitor_response_time{monitor_name="Seerr"}[5m]))
      - name: Pocket
        group: Services
        query:
          query: monitor_status{monitor_name="Pocket"}
          expression: int(result) == 1
          bool: true
        extras:
          - name: Latency
            units: ms
            query: sum(avg_over_time(monitor_response_time{monitor_name="Pocket"}[5m]))
      - name: Auth
        group: Services
        query:
          query: monitor_status{monitor_name="Pocket"}
          expression: int(result) == 1
          bool: true
        extras:
          - name: Latency
            units: ms
            query: sum(avg_over_time(monitor_response_time{monitor_name="Pocket"}[5m]))
      - name: Postgres
        group: Infra
        query:
          query: avg(up{job="crunchy/crunchy-otel-collector"})
          expression: float(result) == 1
          bool: true
        extras:
          - name: Throughput
            units: rps
            query: sum(rate(ccp_pg_stat_statements_total_calls_count[5m]))
          - name: Latency
            units: ms
            query: avg(ccp_pg_stat_statements_top_mean_exec_time_ms)
      - name: Galera
        group: Infra
        query:
          query: avg(mysql_up{job="mariadb-metrics"})
          expression: int(result) == 1
          bool: true
        extras:
          - name: Throughput
            units: rps
            query: sum(irate(mysql_global_status_queries[5m]))
      - name: Dragonfly
        group: Infra
        query:
          query: sum(rate(dragonfly_uptime_in_seconds[1m]))
          expression: float(result) > 2.5
          bool: true
        extras:
          - name: Throughput
            units: rps
            query: sum(rate(dragonfly_commands_processed_total[5m]))

  replicaCount: 2

  ingress:
    enabled: true
    className: public
    annotations:
      kubernetes.io/tls-acme: "true"
    hosts:
      - host: status.henrywhitaker.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: status-henrywhitaker-com-tls
        hosts:
          - status.henrywhitaker.com
