---
# yaml-language-server: $schema=https://henrywhitaker3.github.io/generic-helm-chart/subchart.schema.json
generic:
  replicaCount: 1

  image:
    repository: ghcr.io/louislam/uptime-kuma
    pullPolicy: IfNotPresent
    tag: 2.3.0

  service:
    portName: http
    port: 3001

  resources:
    requests:
      cpu: 150m
      memory: 200Mi

  httpRoute:
    enabled: true
    hostnames: [kuma.plexmox.com]
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: internal
        namespace: gateways
    rules:
      - port: 3001
        matches:
          - path:
              type: PathPrefix
              value: /

  pvc:
    enabled: true
    mountPath: /app/data
    storageClassName: longhorn
    size: 4Gi
    accessModes:
      - ReadWriteOnce

  config:
    PUID: "1000"
    PGID: "1000"
    UPTIME_KUMA_DB_TYPE: mariadb
    UPTIME_KUMA_DB_HOSTNAME: mariadb.mariadb.svc.cluster.local
    UPTIME_KUMA_DB_PORT: "3306"
    UPTIME_KUMA_DB_NAME: kuma
    UPTIME_KUMA_DB_USERNAME: kuma

  env:
    - name: UPTIME_KUMA_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: uptime-kuma
          key: password

  deploymentStrategy:
    type: Recreate
