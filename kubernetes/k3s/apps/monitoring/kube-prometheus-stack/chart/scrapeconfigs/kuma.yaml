---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/monitoring.coreos.com/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: uptime-kuma
spec:
  staticConfigs:
    - targets:
        - uptime-kuma.monitoring.svc.cluster.local:3001
  metricsPath: /metrics
  basicAuth:
    username:
      key: username
      name: uptime-kuma-creds
    password:
      key: password # empty field
      name: uptime-kuma-creds
  relabelings:
    - targetLabel: job
      replacement: uptime-kuma
