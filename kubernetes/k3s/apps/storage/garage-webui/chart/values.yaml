---
# yaml-language-server: $schema=https://henrywhitaker3.github.io/generic-helm-chart/subchart.schema.json
generic:
  replicaCount: 1

  image:
    repository: khairul169/garage-webui
    pullPolicy: IfNotPresent
    tag: "1.1.0"

  service:
    port: 3909

  httpRoute:
    enabled: true
    hostnames: [garage-webui.plexmox.com]
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: internal
        namespace: gateways
    rules:
      - port: 3909
        matches:
          - path:
              type: PathPrefix
              value: /

  env:
    - name: API_BASE_URL
      # TODO: update to use https when container supports it
      value: http://10.0.0.9:3903
    - name: S3_ENDPOINT_URL
      value: https://garage.plexmox.com
    - name: S3_REGION
      value: garage
    - name: API_ADMIN_KEY
      valueFrom:
        secretKeyRef:
          name: garage-secrets
          key: admin-token
