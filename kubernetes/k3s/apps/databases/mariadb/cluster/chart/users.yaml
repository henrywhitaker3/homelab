---
# yaml-language-server: $schema=https://raw.githubusercontent.com/henrywhitaker3/crds/refs/heads/main/schemas/k8s.mariadb.com/users_v1alpha1.json
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: henry
spec:
  name: henry
  host: "%"

  passwordSecretKeyRef:
    name: mariadb-secrets
    key: henry-password

  mariaDbRef:
    name: mariadb
    namespace: mariadb
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/henrywhitaker3/crds/refs/heads/main/schemas/k8s.mariadb.com/grants_v1alpha1.json
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: henry
spec:
  database: "*"
  table: "*"
  privileges: [ALL]
  username: henry

  mariaDbRef:
    name: mariadb
    namespace: mariadb
