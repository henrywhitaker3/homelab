version: "3"

vars:
  changed: "true"

dir: terraform

env:
  TF_HTTP_PASSWORD:
    sh: sops --decrypt terraform/backend.sops.yaml | yq -r '.state-token'

tasks:
  plan:
    desc: Run terraform plan
    cmds:
      - terramate run --parallel 5 {{if eq .changed "true"}}--changed{{end}} --  bash -c 'tofu plan $(for file in *.tfvars; do echo "-var-file $file "; done) {{ .CLI_ARGS }}'

  apply:
    desc: Run terraform apply
    cmds:
      - terramate run --parallel 5 {{if eq .changed "true"}}--changed{{end}} -- bash -c 'tofu apply $(for file in *.tfvars; do echo "-var-file $file "; done){{ .CLI_ARGS }}'

  init:
    desc: Run terraform init
    cmds:
      - |
        terramate run --parallel 1 \
          {{if eq .changed "true"}}--changed{{end}} \
          -- bash -c 'tofu init {{ .CLI_ARGS }}'
