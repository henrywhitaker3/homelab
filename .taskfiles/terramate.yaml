version: "3"

vars:
  changed: "true"

env:
  TF_HTTP_PASSWORD:
    sh: sops --decrypt terraform/backend.sops.yaml | yq -r '.state-token'

tasks:
  plan:
    desc: Run terraform plan
    dir: terraform
    cmds:
      - terramate run --enable-sharing --parallel 5 {{ .CLI_ARGS }} {{if eq .changed "true"}}--changed{{end}} --  bash -c 'tofu plan $(shopt -s nullglob; for file in *.tfvars; do echo "-var-file $file "; done) -out out.tfplan'

  apply:
    desc: Run terraform apply
    dir: terraform
    vars:
      approve: '{{ .approve | default "false" }}'
      with_plan: '{{ .with_plan | default "true" }}'
    cmds:
      - >
        terramate run --parallel 5
        --enable-sharing  {{ .CLI_ARGS }}
        {{ if eq .changed "true" }}--changed{{ end }}
        -- bash -c 'tofu apply
        {{ if eq .approve "true" }}-auto-approve{{ end }}
        {{ if eq .with_plan "true" }}out.tfplan{{ end }}
        {{ if eq .with_plan "false" }}$(shopt -s nullglob; for file in *.tfvars; do echo "-var-file $file "; done){{ end }}'

  init:
    desc: Run terraform init
    dir: terraform
    cmds:
      - >
        terramate run --parallel 1
        --include-all-dependencies
        -- bash -c 'tofu init {{ .CLI_ARGS }}'

  output:
    desc: Run terraform output
    requires:
      vars: [module]
    dir: terraform
    cmds:
      - |
        terramate run --parallel 1 -C "{{ .module }}" \
          -- bash -c 'tofu output {{ .CLI_ARGS }}'
