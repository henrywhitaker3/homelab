version: "3"

vars:
  changed: "true"

env:
  TF_HTTP_PASSWORD:
    sh: sops --decrypt terraform/backend.sops.yaml | yq -r '.state-token'

tasks:
  plan:
    desc: Run terraform plan
    dir: terraform
    cmds:
      - terramate run --enable-sharing --parallel 5 {{if eq .changed "true"}}--changed{{end}} --  bash -c 'tofu plan $(for file in *.tfvars; do echo "-var-file $file "; done) {{ .CLI_ARGS }}'

  apply:
    desc: Run terraform apply
    dir: terraform
    vars:
      with_plan: "false"
    cmds:
      - |
        terramate run --parallel 5 \
        --enable-sharing \
        {{if eq .changed "true"}}--changed{{end}} \
        {{if eq .with_plan "true"}}--terraform-plan-file=out.tfplan{{end}} -- bash -c 'tofu apply $(for file in *.tfvars; do echo "-var-file $file "; done) {{ .CLI_ARGS }}'

  init:
    desc: Run terraform init
    dir: terraform
    cmds:
      - |
        terramate run --parallel 1 \
          -- bash -c 'tofu init {{ .CLI_ARGS }}'
