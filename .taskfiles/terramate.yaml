version: "3"

vars:
  changed: "true"

env:
  TF_HTTP_PASSWORD:
    sh: sops --decrypt terraform/backend.sops.yaml | yq -r '.state-token'

tasks:
  plan:
    desc: Run terraform plan
    dir: terraform
    cmds:
      - terramate run --enable-sharing --parallel 5 {{ .CLI_ARGS }} {{if eq .changed "true"}}--changed{{end}} --  bash -c 'tofu plan $(shopt -s nullglob; for file in *.tfvars; do echo "-var-file $file "; done)'

  apply:
    desc: Run terraform apply
    dir: terraform
    vars:
      with_plan: "false"
    cmds:
      - |
        terramate run --parallel 5 \
        --enable-sharing  {{ .CLI_ARGS }} \
        {{if eq .changed "true"}}--changed{{end}} \
        {{if eq .with_plan "true"}}--terraform-plan-file=out.tfplan{{end}} -- bash -c 'tofu apply $(shopt -s nullglob; for file in *.tfvars; do echo "-var-file $file "; done)'

  init:
    desc: Run terraform init
    dir: terraform
    cmds:
      - |
        terramate run --parallel 1 \
          -- bash -c 'tofu init {{ .CLI_ARGS }}'

  output:
    desc: Run terraform output
    requires:
      vars: [module]
    dir: terraform
    cmds:
      - |
        terramate run --parallel 1 -C "{{ .module }}" \
          -- bash -c 'tofu output {{ .CLI_ARGS }}'
