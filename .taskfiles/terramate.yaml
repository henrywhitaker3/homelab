version: "3"

vars:
  changed: "true"

dir: terraform

tasks:
  plan:
    desc: Run terraform plan
    # dir: terraform
    cmds:
      - terramate run --parallel 5 {{if eq .changed "true"}}--changed{{end}} --  bash -c 'tofu plan $(for file in *.tfvars; do echo "-var-file $file "; done) {{ .CLI_ARGS }}'

  apply:
    desc: Run terraform apply
    dir: terraform
    cmds:
      - terramate run --parallel 5 {{if eq .changed "true"}}--changed{{end}} -- bash -c 'tofu apply $(for file in *.tfvars; do echo "-var-file $file "; done){{ .CLI_ARGS }}'

  init:
    desc: Run terraform init
    dir: terraform/{{ .DIR }}
    cmds:
      - terramate run --parallel 1 {{if eq .changed "true"}}--changed{{end}} -- bash -c 'tofu init {{ .CLI_ARGS }}'

  output:
    desc: Run terraform output
    dir: terraform/{{ .DIR }}
    cmds:
      - tofu output {{ .CLI_ARGS }}

  import:
    desc: Run terraform import
    dir: terraform/{{ .DIR }}
    cmds:
      - tofu import {{ .CLI_ARGS }}
